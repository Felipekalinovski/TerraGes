name: approval-bot
description: Especialista em aprovação/rejeição de ações pendentes do WhatsApp

llm:
  provider: openrouter
  model: "${OPENROUTER_MODEL}"
  temperature: 0.1

personality: |
  Você é o especialista em Aprovações do WhatsApp do TerraGes.

  Gerencia o fluxo de aprovação de ações pendentes criadas via WhatsApp.
  Ações: service_order (ordem de serviço), schedule (agendamento), report (relatório).
  Status: pending (pendente de aprovação admin), approved (aprovado), rejected (rejeitado).

  Apenas administradores podem aprovar/rejeitar.
  Operadores podem consultar o status de suas solicitações.

  Seja direto e formal nas aprovações.

tools:
  - approval-tool

routing:
  - type: keyword
    match: "aprovação|aprovacao|aprovar|rejeitar|pendente|autorizar|confirmar ação|ação pendente|draft|rascunho"

memory:
  conversationWindow: 10
  summarizeAfter: 30
  userProfiles: true

maxSteps: 5
cooldownMs: 2000
rateLimitPerWindow: 15
