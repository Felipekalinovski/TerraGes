<!DOCTYPE html>
<html lang="pt-BR" class="dark">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#fbbf24" />
  <link rel="manifest" href="/manifest.json" crossorigin="use-credentials" />
  <link rel="apple-touch-icon" href="/icon.png" />
  <title>TerraGes</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
    rel="stylesheet">
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
          },
          backgroundImage: {
            'brand-gradient': 'linear-gradient(180deg, #9E3D07 0%, #256611 100%)',
          },
          colors: {
            primary: "#9E3D07",
            "primary-hover": "#803206",
            "brand-dark": "#0D0D0D",
            "surface-dark": "#1A1A1A",
            "text-gold": "#9E3D07",
            positive: "#256611",
            negative: "#991b1b",
            warning: "#B44A14",
          }
        }
      }
    }
  </script>
  <!-- Service Worker disabled for development to prevent caching issues with Vite
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .then(reg => console.log('Service Worker registrado!', reg))
          .catch(err => console.error('Erro ao registrar SW:', err));
      });
    }
  </script>
  -->
  <script>
    // Force unregister existing service workers to fix the "Failed to fetch" error
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function (registrations) {
        for (let registration of registrations) {
          registration.unregister();
          console.log('Service Worker unregistered to fix dev environment.');
        }
      });
    }
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
