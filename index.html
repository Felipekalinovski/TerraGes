<!DOCTYPE html>
<html lang="pt-BR" class="dark">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#fbbf24" />
  <link rel="manifest" href="/manifest.json" crossorigin="use-credentials" />
  <link rel="apple-touch-icon" href="/icon.png" />
  <link rel="icon" type="image/png" href="/favicon.png" />
  <title>TerraGes</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@700;800;900&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            heading: ['Outfit', 'sans-serif'],
          },
          backgroundImage: {
            'brand-gradient': 'radial-gradient(circle at top left, #121212, #050505)',
            'glass-gradient': 'linear-gradient(135deg, rgba(255, 255, 255, 0.05), rgba(255, 255, 255, 0.01))',
          },
          colors: {
            primary: "#10B981", 
            "primary-hover": "#059669",
            "brand-dark": "#050505",
            "surface-dark": "#121212",
            "text-gold": "#10B981", 
            positive: "#10B981",
            negative: "#EF4444",
            warning: "#FF9500",
            accent: "#10B981",
          },
          boxShadow: {
            'neon': '0 0 10px rgba(16, 185, 129, 0.2)',
            'glass': '0 8px 32px 0 rgba(0, 0, 0, 0.8)',
          }
        }
      }
    }
  </script>
  <!-- Service Worker disabled for development to prevent caching issues with Vite
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .then(reg => console.log('Service Worker registrado!', reg))
          .catch(err => console.error('Erro ao registrar SW:', err));
      });
    }
  </script>
  -->
  <script>
    // Force unregister existing service workers to fix the "Failed to fetch" error
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function (registrations) {
        for (let registration of registrations) {
          registration.unregister();
          console.log('Service Worker unregistered to fix dev environment.');
        }
      });
    }
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
